# Vidmaker3 Microservices Architecture
#
# This docker-compose runs the complete system with:
# 1. discord-bot - Lightweight Discord bot (orchestrator only)
# 2. transcription-service - Whisper transcription API
# 3. video-processing-service - Video editing, subtitle burning
# 4. face-detection-service - S3FD face detection
# 5. redis - Job queue (optional)
#
# Usage:
#   docker-compose -f docker-compose.microservices.yml up -d
#   docker-compose -f docker-compose.microservices.yml logs -f

version: '3.8'

services:
  # ============================================================
  # Discord Bot - LIGHTWEIGHT (orchestrator only)
  # ============================================================
  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot-lightweight
    container_name: vidmaker3-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Service URLs (internal Docker network)
      - TRANSCRIPTION_SERVICE_URL=http://transcription-service:8001
      - FACE_DETECTION_SERVICE_URL=http://face-detection-service:8002
      - VIDEO_PROCESSING_SERVICE_URL=http://video-processing-service:8003
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - transcription-service
      - video-processing-service
      - face-detection-service
    networks:
      - vidmaker3-network

  # ============================================================
  # Transcription Service (Whisper)
  # ============================================================
  transcription-service:
    build:
      context: .
      dockerfile: Dockerfile.transcription
    container_name: vidmaker3-transcription
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MODEL_SIZE=base
      - COMPUTE_TYPE=float16
    volumes:
      - ./temp:/app/temp
      - ./models_cache:/app/models
    networks:
      - vidmaker3-network
    deploy:
      resources:
        limits:
          # GPUs: 1 for transcription
          nvidia: 
            count: 1
          memory: 4G

  # ============================================================
  # Video Processing Service
  # ============================================================
  video-processing-service:
    build:
      context: .
      dockerfile: Dockerfile.video-processing
    container_name: vidmaker3-video-processing
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - R2_ENDPOINT_URL=${R2_ENDPOINT_URL}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
    volumes:
      - ./temp:/app/temp
    networks:
      - vidmaker3-network
    deploy:
      resources:
        limits:
          memory: 4G

  # ============================================================
  # Face Detection Service (S3FD)
  # ============================================================
  face-detection-service:
    build:
      context: .
      dockerfile: Dockerfile.face-detection
    container_name: vidmaker3-face-detection
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./temp:/app/temp
      - ./models_cache:/app/models
    networks:
      - vidmaker3-network
    deploy:
      resources:
        limits:
          nvidia:
            count: 1
          memory: 4G

  # ============================================================
  # Redis (optional - for job queue)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: vidmaker3-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - vidmaker3-network
    command: redis-server --appendonly yes

networks:
  vidmaker3-network:
    driver: bridge

volumes:
  redis-data:
